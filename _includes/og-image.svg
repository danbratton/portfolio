{%- comment -%}
Shared OpenGraph image template. Rendered by Jekyll per-page from files
in assets/og/*.svg. Parameters:

  include.eyebrow  — small uppercase label above the title (e.g. "Case study", "Portfolio")
  include.title    — the main headline (wraps to 2 lines if long)
  include.subtitle — optional secondary line below the title
  include.tag      — optional footer tag (defaults to site url, uppercased, stripped of protocol)

Colors come from the site palette (Cowork-lifted):
  --bg   #fafaf8   --text  #1a1a1a   --muted #5a5a5a   --accent #c2410c
{%- endcomment -%}
{%- assign eyebrow = include.eyebrow | default: "Portfolio" -%}
{%- assign title = include.title | default: site.title -%}
{%- assign subtitle = include.subtitle | default: site.description -%}
{%- assign tag = include.tag | default: site.url | remove: "https://" | remove: "http://" | remove: "www." | upcase -%}

{%- comment -%} Wrap the title into (up to) two lines at ~26 chars. {%- endcomment -%}
{%- assign title_words = title | split: " " -%}
{%- assign line1 = "" -%}
{%- assign line2 = "" -%}
{%- assign line2_started = false -%}
{%- for word in title_words -%}
  {%- if line2_started -%}
    {%- if line2 == "" -%}{%- assign line2 = word -%}{%- else -%}{%- assign line2 = line2 | append: " " | append: word -%}{%- endif -%}
  {%- else -%}
    {%- if line1 == "" -%}
      {%- assign line1 = word -%}
    {%- else -%}
      {%- assign candidate = line1 | append: " " | append: word -%}
      {%- assign candidate_len = candidate | size -%}
      {%- if candidate_len > 26 -%}
        {%- assign line2_started = true -%}
        {%- assign line2 = word -%}
      {%- else -%}
        {%- assign line1 = candidate -%}
      {%- endif -%}
    {%- endif -%}
  {%- endif -%}
{%- endfor -%}
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#fafaf8"/>
  <rect x="0" y="0" width="12" height="630" fill="#c2410c"/>

  <text x="80" y="180"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="28" font-weight="600" fill="#c2410c" letter-spacing="4">{{ eyebrow | upcase | xml_escape }}</text>

  <text x="80" y="300"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="700" fill="#1a1a1a" letter-spacing="-2">{{ line1 | xml_escape }}</text>
  {%- if line2 != "" %}
  <text x="80" y="382"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="700" fill="#1a1a1a" letter-spacing="-2">{{ line2 | xml_escape }}</text>
  {%- endif %}

  {%- if subtitle and subtitle != "" %}
  <text x="80" y="{% if line2 != '' %}452{% else %}370{% endif %}"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="30" font-weight="400" fill="#5a5a5a">{{ subtitle | truncate: 70 | xml_escape }}</text>
  {%- endif %}

  <text x="80" y="550"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="600" fill="#c2410c" letter-spacing="2">{{ tag | xml_escape }}</text>
</svg>
